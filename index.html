<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AxtarTap</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#6d0000;
    color:white;
    padding:15px;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.search-box{
    margin-top:10px;
}

.search-box input{
    width:70%;
    padding:10px;
}

.search-box button{
    padding:10px;
}

.container{
    width:90%;
    margin:auto;
}

.categories{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;
    margin-top:20px;
}

.category{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}

.ads{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;
    margin-top:20px;
}

.ad{
    background:white;
    border-radius:10px;
    overflow:hidden;
}

.ad img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.ad-info{
    padding:10px;
}

.price{
    color:green;
    font-weight:bold;
}
</style>

</head>
<body>

<header>

<div class="logo">AxtarTap</div>

<div class="search-box">
<input type="text" placeholder="Nə axtarırsınız?">
<button>Axtar</button>
</div>

</header>

<div class="container">

<h2>Kateqoriyalar</h2>

<div class="categories">

<div class="category">📱 Telefonlar</div>
<div class="category">🚗 Avtomobillər</div>
<div class="category">🏠 Daşınmaz əmlak</div>
<div class="category">💻 Kompüterlər</div>
<div class="category">👕 Geyim</div>
<div class="category">🎮 Oyunlar</div>

</div>

<h2>Son elanlar</h2>

<div class="ads">

<div class="ad">
<img src="https://picsum.photos/400/300">
<div class="ad-info">
<h3>iPhone 15 Pro</h3>
<div class="price">2100 AZN</div>
</div>
</div>

<div class="ad">
<img src="https://picsum.photos/401/300">
<div class="ad-info">
<h3>BMW F10</h3>
<div class="price">23500 AZN</div>
</div>
</div>

<div class="ad">
<img src="https://picsum.photos/402/300">
<div class="ad-info">
<h3>2 otaqlı mənzil</h3>
<div class="price">125000 AZN</div>
</div>
</div>

</div>

</div>

<script>

const ads = document.querySelectorAll(".ad");

document.querySelector("button").addEventListener("click",()=>{

const text =
document.querySelector("input")
.value
.toLowerCase();

ads.forEach(ad=>{

if(ad.innerText.toLowerCase().includes(text))
{
ad.style.display="block";
}
else
{
ad.style.display="none";
}

});

});

</script>
<hr>

<div style="width:90%;margin:auto;background:white;padding:20px;border-radius:10px;margin-top:20px;">

<h2>Yeni Elan Əlavə Et</h2>

<input id="title" placeholder="Elan başlığı"
style="width:100%;padding:10px;margin-bottom:10px;">

<input id="price" placeholder="Qiymət"
style="width:100%;padding:10px;margin-bottom:10px;">

<input id="image" placeholder="Şəkil linki"
style="width:100%;padding:10px;margin-bottom:10px;">

<button onclick="addAd()"
style="padding:10px 20px;">
Elanı əlavə et
</button>

</div>

<script>

function addAd(){

let title =
document.getElementById("title").value;

let price =
document.getElementById("price").value;

let image =
document.getElementById("image").value;

if(title=="" || price==""){
alert("Məlumatları doldurun");
return;
}

let ad = document.createElement("div");

ad.className="ad";

ad.innerHTML=`

<img src="${image || 'https://picsum.photos/500/300'}">

<div class="ad-info">

<h3>${title}</h3>

<div class="price">${price} AZN</div>

</div>

`;

document.querySelector(".ads").prepend(ad);

document.getElementById("title").value="";
document.getElementById("price").value="";
document.getElementById("image").value="";

alert("Elan əlavə edildi");

}

</script>

price:price,
image:image
});

"axtartap_ads",
JSON.stringify(adsData)
);

JSON.parse(data);

let ad=document.createElement("div");

ad.className="ad";

ad.innerHTML=`

<img src="${item.image}">

<div class="ad-info">

<h3>${item.title}</h3>

<div class="price">${item.price}</div>

</div>

`;

document.querySelector(".ads").appendChild(ad);

});

}

alert("Elan əlavə edildi");

}

loadAds();

</script>

    <script>

function registerUser(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username=="" || password==""){
alert("Bütün xanaları doldurun");
return;
}

localStorage.setItem("axtartap_username",username);
localStorage.setItem("axtartap_password",password);

alert("Qeydiyyat uğurlu oldu");

}

function loginUser(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let savedUser=localStorage.getItem("axtartap_username");
let savedPass=localStorage.getItem("axtartap_password");

if(username===savedUser && password===savedPass){

localStorage.setItem("logged_user",username);

document.getElementById("status").innerHTML=
"✅ Daxil olub: "+username;

}else{

alert("İstifadəçi adı və ya parol səhvdir");

}

}

function logoutUser(){

localStorage.removeItem("logged_user");

document.getElementById("status").innerHTML=
"❌ Hesabdan çıxılıb";

}

function checkLogin(){

let user=localStorage.getItem("logged_user");

if(user){

document.getElementById("status").innerHTML=
"✅ Daxil olub: "+user;

}

}

function saveAds(){

let adsData=[];

document.querySelectorAll(".ad").forEach(ad=>{

adsData.push({

title:ad.querySelector("h3").innerText,
price:ad.querySelector(".price").innerText,
image:ad.querySelector("img").src,
user:ad.querySelector("p") ?
ad.querySelector("p").innerText : ""

});

});

"axtartap_ads",
JSON.stringify(adsData)
);

}

localStorage.getItem("axtartap_ads");

});
