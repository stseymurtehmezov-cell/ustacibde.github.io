<!DOCTYPE html>
<html lang="az">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AxtarTap</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}

body{

background:#f3f4f6;

}

header{

background:#7a0000;
padding:15px;
position:sticky;
top:0;
z-index:999;
box-shadow:0 2px 10px rgba(0,0,0,.2);

}

.top{

display:flex;
align-items:center;
justify-content:space-between;
gap:15px;
flex-wrap:wrap;

}

.logo{

font-size:34px;
font-weight:700;
color:white;

}

.logo span{

color:#ffd700;

}

.search{

flex:1;
display:flex;
gap:10px;

}

.search input{

flex:1;
padding:12px;
border:none;
border-radius:8px;
outline:none;

}

.search button{

background:#ffd700;
border:none;
padding:12px 22px;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}

.menu{

display:flex;
gap:10px;

}

.menu button{

background:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;

}

.container{

width:95%;
margin:auto;

}

.banner{

margin-top:20px;
height:110px;
background:white;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
border:2px dashed #bbb;
font-size:26px;
color:#888;

}
  .categories{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
margin-top:25px;

}

.category{

background:white;
padding:20px;
border-radius:12px;
text-align:center;
font-weight:600;
cursor:pointer;
transition:.3s;
box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.category:hover{

background:#7a0000;
color:white;
transform:translateY(-4px);

}

.card{

background:white;
margin-top:25px;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.card h2{

margin-bottom:15px;

}

input,
textarea,
select{

width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
outline:none;

}

textarea{

height:120px;
resize:vertical;

}

.mainBtn{

width:100%;
padding:14px;
background:#7a0000;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

.ads{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
margin-top:20px;

}

.ad{

background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);

}

.ad img{

width:100%;
height:220px;
object-fit:cover;

}

.ad-info{

padding:15px;

}

.price{

font-size:24px;
font-weight:bold;
color:#0a8f2c;
margin:10px 0;

}
 .owner{

font-size:14px;
color:#666;

}

.actions{

display:flex;
gap:8px;
margin-top:15px;

}

.actions button{

flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;

}

.favorite{

background:#ffd54f;

}

.delete{

background:#c62828;
color:white;

}

.adBanner{

margin:30px 0;
height:90px;
background:white;
border:2px dashed #bbb;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:#888;

}

footer{

margin-top:40px;
background:#222;
color:white;
padding:30px;
text-align:center;

}

@media(max-width:768px){

.top{

flex-direction:column;

}

.search{

width:100%;

}

.logo{

font-size:28px;

}

}

</style>

</head>

<body>

<header>

<div class="top">

<div class="logo">

Axtar<span>Tap</span>

</div>

<div class="search">

<input
id="searchInput"
placeholder="Nə axtarırsınız?">

<button
onclick="searchAds()">

Axtar

</button>

</div>

<div class="menu">

<button
onclick="registerUser()">

Qeydiyyat

</button>

<button
onclick="loginUser()">

Giriş

</button>

</div>

</div>

</header>

<div class="container">
  <div class="banner">

REKLAM BANNERİ
(728x90)

</div>

<div class="categories">

<div class="category">📱 Telefonlar</div>

<div class="category">🚗 Avtomobillər</div>

<div class="category">🏠 Daşınmaz Əmlak</div>

<div class="category">💻 Kompüterlər</div>

<div class="category">👕 Geyim</div>

<div class="category">🎮 Oyunlar</div>

<div class="category">🪑 Mebel</div>

<div class="category">🐶 Heyvanlar</div>

</div>

<div class="card">

<h2>

Hesab

</h2>

<input
id="username"
placeholder="İstifadəçi adı">

<input
id="password"
type="password"
placeholder="Parol">

<p
id="status"
style="margin-bottom:15px;font-weight:bold;">

Hesaba daxil olun

</p>

</div>

<div class="card">

<h2>

Yeni Elan

</h2>

<input
id="title"
placeholder="Elan başlığı">

<input
id="price"
placeholder="Qiymət (AZN)">

<input
id="image"
placeholder="Şəkil linki">
<select id="category">

<option>Telefonlar</option>
<option>Avtomobillər</option>
<option>Daşınmaz Əmlak</option>
<option>Kompüterlər</option>
<option>Geyim</option>
<option>Oyunlar</option>
<option>Mebel</option>
<option>Heyvanlar</option>

</select>

<input
id="phone"
placeholder="Telefon nömrəsi">

<textarea
id="description"
placeholder="Elanın tam təsviri"></textarea>

<button
class="mainBtn"
onclick="addAd()">

Elanı Paylaş

</button>

</div>

<div class="adBanner">

REKLAM YERİ
(970x90)

</div>

<h2 style="margin-top:30px;">

Son Elanlar

</h2>

<div
id="allAds"
class="ads">

</div>

<h2 style="margin-top:30px;">

Mənim Elanlarım

</h2>

<div
id="myAds"
class="ads">

</div>
<footer>

<p>

© 2026 AxtarTap.az

</p>

<p style="margin-top:10px;">

Bütün hüquqlar qorunur.

</p>

</footer>

<script>

const SUPABASE_URL =
"https://bpqxidtrunforkvulapt.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwcXhpZHRydW5mb3JrdnVsYXB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTg4MTIsImV4cCI6MjA5Nzg5NDgxMn0.wdL42jeXP2Hm4yN2BOpbeMwh3huRbeazJ6-I6fDhLDU";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let currentUser = null;
window.onload = async function(){

checkLogin();

await loadAds();

};

function checkLogin(){

const user =
localStorage.getItem("logged_user");

if(user){

currentUser=user;

document.getElementById("status").innerHTML=
"✅ Daxil olub: "+user;

}

loadAds();

}

async function registerUser(){

const username=
document.getElementById("username").value.trim();

const password=
document.getElementById("password").value.trim();

if(username=="" || password==""){

alert("İstifadəçi adı və parol daxil edin.");

return;

}

const { error }=
await supabase

.from("users")

.insert([{

username,

password

}]);

if(error){

alert(error.message);

return;

}

alert("Qeydiyyat uğurla tamamlandı.");

}
  async function loginUser(){

const username=
document.getElementById("username").value.trim();

const password=
document.getElementById("password").value.trim();

const { data,error }=
await supabase

.from("users")

.select("*")

.eq("username",username)

.eq("password",password);

if(error){

alert(error.message);

return;

}

if(data.length==0){

alert("İstifadəçi adı və ya parol yanlışdır.");

return;

}

currentUser=username;

localStorage.setItem(
"logged_user",
username
);

document.getElementById("status").innerHTML=
"✅ Daxil olub: "+username;

showMyAds();

}

function logoutUser(){

currentUser=null;

localStorage.removeItem(
"logged_user"
);

document.getElementById("status").innerHTML=
"Hesabdan çıxılıb";

showMyAds();

}
  async function addAd(){

if(!currentUser){

alert("Əvvəlcə hesabınıza daxil olun.");

return;

}

const title=
document.getElementById("title").value.trim();

const price=
document.getElementById("price").value.trim();

const image=
document.getElementById("image").value.trim();

const category=
document.getElementById("category").value;

const phone=
document.getElementById("phone").value.trim();

const description=
document.getElementById("description").value.trim();

if(title=="" || price==""){

alert("Başlıq və qiymət daxil edin.");

return;

}

const { error }=
await supabase

.from("ads")

.insert([{

title,

price,

image,

category,

phone,

description,

owner:currentUser

}]);

if(error){

alert(error.message);

return;

}

alert("Elan uğurla əlavə edildi.");

document.getElementById("title").value="";
document.getElementById("price").value="";
document.getElementById("image").value="";
document.getElementById("phone").value="";
document.getElementById("description").value="";

loadAds();

}
  async function loadAds(){

const { data,error }=
await supabase

.from("ads")

.select("*")

.order("id",{ascending:false});

if(error){

console.log(error);

return;

}

const allAds=
document.getElementById("allAds");

allAds.innerHTML="";

data.forEach(ad=>{

createCard(ad);

});

showMyAds();

}

function createCard(ad){

const div=
document.createElement("div");

div.className="ad";

div.dataset.owner=ad.owner;

div.dataset.id=ad.id;

div.innerHTML=`

<img src="${ad.image || "https://picsum.photos/600/400"}">

<div class="ad-info">

<h3>${ad.title}</h3>

<div class="price">

${ad.price} AZN

</div>

<p><b>Kateqoriya:</b> ${ad.category}</p>

<p><b>Telefon:</b> ${ad.phone}</p>

<p>${ad.description}</p>

<p class="owner">

👤 ${ad.owner}

</p>

<div class="actions">

<button
class="favorite"
onclick="favoriteAd(this)">

❤️ Favori

</button>

<button
class="delete"
onclick="deleteAd(this)">

🗑 Sil

</button>

</div>

</div>

`;

allAds.appendChild(div);

}
  function deleteAd(btn){

const card=
btn.closest(".ad");

if(card.dataset.owner!=currentUser){

alert("Yalnız öz elanınızı silə bilərsiniz.");

return;

}

if(confirm("Elan silinsin?")){

deleteAdFromDatabase(card.dataset.id);

}

}

async function deleteAdFromDatabase(id){

const { error }=
await supabase

.from("ads")

.delete()

.eq("id",id);

if(error){

alert(error.message);

return;

}

loadAds();

}

function favoriteAd(btn){

if(btn.innerHTML=="❤️ Favori"){

btn.innerHTML="💖 Seçilmiş";

}else{

btn.innerHTML="❤️ Favori";

}

}
  function searchAds(){

const text=
document.getElementById("searchInput")
.value
.toLowerCase();

document
.querySelectorAll(".ad")
.forEach(ad=>{

if(ad.innerText.toLowerCase().includes(text)){

ad.style.display="block";

}else{

ad.style.display="none";

}

});

}

function showMyAds(){

const box=
document.getElementById("myAds");

box.innerHTML="";

document
.querySelectorAll("#allAds .ad")
.forEach(ad=>{

if(ad.dataset.owner==currentUser){

box.appendChild(
ad.cloneNode(true)
);

}

});

}

document
.getElementById("searchInput")
.addEventListener(
"keyup",
searchAds
);

function openProfile(){

    if(!currentUser){

        alert("Əvvəlcə hesabınıza daxil olun.");

        return;

    }

    let myAds =
    document.getElementById("myAds");

    if(myAds){

        myAds.scrollIntoView({
            behavior:"smooth"
        });
    }

}

function updateStatus(){

    const status =
    document.getElementById("status");

    if(!status) return;

    if(currentUser){

        status.innerHTML =
        "✅ Xoş gəlmisiniz, <b>" +
        currentUser +
        "</b>";

    }else{

        status.innerHTML =
        "❌ Hesaba daxil olun";

    }

}

setInterval(updateStatus,1000);

  function clearAdForm(){

document.getElementById("title").value="";

document.getElementById("price").value="";

document.getElementById("image").value="";

document.getElementById("phone").value="";

document.getElementById("description").value="";

document.getElementById("category").selectedIndex=0;

}

function refreshPage(){

loadAds();

showMyAds();

}

setInterval(function(){

if(currentUser){

refreshPage();

}

},30000);
