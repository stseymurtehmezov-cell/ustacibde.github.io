<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AxtarTap</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#7a0000;
color:white;
padding:15px;
}

.logo{
font-size:32px;
font-weight:bold;
}

.search-area{
margin-top:10px;
display:flex;
gap:10px;
}

.search-area input{
flex:1;
padding:10px;
}

.search-area button{
padding:10px 20px;
cursor:pointer;
}

.container{
width:95%;
margin:auto;
}

.card{
background:white;
margin-top:20px;
padding:20px;
border-radius:10px;
}

.card h2{
margin-bottom:15px;
}

.categories{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
}

.category{
background:#fff;
padding:15px;
border-radius:10px;
text-align:center;
border:1px solid #ddd;
font-weight:bold;
}

input,
textarea,
select{
width:100%;
padding:10px;
margin-bottom:10px;
}

textarea{
height:100px;
resize:vertical;
}

button{
padding:10px 15px;
cursor:pointer;
}

.ads{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:15px;
margin-top:15px;
}

.ad{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.ad img{
width:100%;
height:180px;
object-fit:cover;
}

.ad-info{
padding:10px;
}

.price{
font-size:20px;
font-weight:bold;
color:green;
margin:10px 0;
}

.owner{
color:#555;
font-size:14px;
}

.action-buttons{
display:flex;
gap:5px;
margin-top:10px;
}

.action-buttons button{
flex:1;
}

#status{
margin-top:10px;
font-weight:bold;
}

</style>

</head>
<body>

<header>

<div class="logo">
AxtarTap
</div>

<div class="search-area">

<input
id="searchInput"
placeholder="Nə axtarırsınız?">

<button onclick="searchAds()">
Axtar
</button>

</div>

</header>

<div class="container">

<div class="card">

<h2>Kateqoriyalar</h2>

<div class="categories">

<div class="category">📱 Telefonlar</div>
<div class="category">🚗 Avtomobillər</div>
<div class="category">🏠 Daşınmaz Əmlak</div>
<div class="category">💻 Kompüterlər</div>
<div class="category">👕 Geyim</div>
<div class="category">🎮 Oyunlar</div>

</div>

</div>

<div class="card">

<h2>Hesab</h2>

<input
id="username"
placeholder="İstifadəçi adı">

<input
id="password"
type="password"
placeholder="Parol">

<button onclick="registerUser()">
Qeydiyyat
</button>

<button onclick="loginUser()">
Giriş
</button>

<button onclick="logoutUser()">
Çıxış
</button>

<p id="status"></p>

</div>

<div class="card">

<h2>Yeni Elan</h2>

<input
id="title"
placeholder="Elan başlığı">

<input
id="price"
placeholder="Qiymət">

<input
id="image"
placeholder="Şəkil linki">

<select id="category">

<option>Telefonlar</option>
<option>Avtomobillər</option>
<option>Daşınmaz Əmlak</option>
<option>Kompüterlər</option>
<option>Geyim</option>
<option>Oyunlar</option>

</select>

<input
id="phone"
placeholder="Telefon nömrəsi">

<textarea
id="description"
placeholder="Elanın təsviri"></textarea>

<button onclick="addAd()">
Elanı əlavə et
</button>

</div>

<div class="card">

<h2>Son Elanlar</h2>

<div id="allAds" class="ads">

</div>

</div>

<div class="card">

<h2>Mənim Elanlarım</h2>

<div id="myAds" class="ads">

</div>

</div>
<script>

function registerUser(){

let username =
document.getElementById("username").value.trim();

let password =
document.getElementById("password").value.trim();

if(username==="" || password===""){

alert("İstifadəçi adı və parol daxil edin");
return;

}

localStorage.setItem(
"axtartap_username",
username
);

localStorage.setItem(
"axtartap_password",
password
);

alert("Qeydiyyat uğurla tamamlandı");

}

function loginUser(){

let username =
document.getElementById("username").value.trim();

let password =
document.getElementById("password").value.trim();

let savedUser =
localStorage.getItem("axtartap_username");

let savedPass =
localStorage.getItem("axtartap_password");

if(
username===savedUser &&
password===savedPass
){

localStorage.setItem(
"logged_user",
username
);

document.getElementById("status").innerHTML =
"✅ Daxil olub: " + username;

showMyAds();

}else{

alert("İstifadəçi adı və ya parol yanlışdır");

}

}

function logoutUser(){

localStorage.removeItem("logged_user");

document.getElementById("status").innerHTML =
"❌ Hesabdan çıxılıb";

showMyAds();

}

function checkLogin(){

let user =
localStorage.getItem("logged_user");

if(user){

document.getElementById("status").innerHTML =
"✅ Daxil olub: " + user;

}

}

function saveAds(){

let adsData=[];

document.querySelectorAll("#allAds .ad")
.forEach(ad=>{

adsData.push({

title:ad.dataset.title,
price:ad.dataset.price,
image:ad.dataset.image,
category:ad.dataset.category,
phone:ad.dataset.phone,
description:ad.dataset.description,
owner:ad.dataset.owner,
date:ad.dataset.date

});

});

localStorage.setItem(
"axtartap_ads",
JSON.stringify(adsData)
);

}

function addAd(){

let currentUser =
localStorage.getItem("logged_user");

if(!currentUser){

alert("Əvvəlcə hesabınıza daxil olun");
return;

}

let title =
document.getElementById("title").value.trim();

let price =
document.getElementById("price").value.trim();

let image =
document.getElementById("image").value.trim();

let category =
document.getElementById("category").value;

let phone =
document.getElementById("phone").value.trim();

let description =
document.getElementById("description").value.trim();

if(title==="" || price===""){

alert("Başlıq və qiymət daxil edin");
return;

}

let date =
new Date().toLocaleString();

createAdCard({
title,
price,
image,
category,
phone,
description,
owner:currentUser,
date
});

saveAds();
showMyAds();

document.getElementById("title").value="";
document.getElementById("price").value="";
document.getElementById("image").value="";
document.getElementById("phone").value="";
document.getElementById("description").value="";

alert("Elan əlavə edildi");

}

function createAdCard(data){

let ad =
document.createElement("div");

ad.className="ad";

ad.dataset.title=data.title;
ad.dataset.price=data.price;
ad.dataset.image=data.image;
ad.dataset.category=data.category;
ad.dataset.phone=data.phone;
ad.dataset.description=data.description;
ad.dataset.owner=data.owner;
ad.dataset.date=data.date;

ad.innerHTML=`

<img src="${
data.image || 'https://picsum.photos/500/300'
}">

<div class="ad-info">

<h3>${data.title}</h3>

<div class="price">
${data.price} AZN
</div>

<p><b>Kateqoriya:</b> ${data.category}</p>

<p><b>Telefon:</b> ${data.phone}</p>

<p>${data.description}</p>

<p>🕒 ${data.date}</p>

<p class="owner">
👤 ${data.owner}
</p>

<div class="action-buttons">

<button onclick="favoriteAd(this)">
❤️ Favori
</button>

<button onclick="deleteAd(this)">
🗑 Sil
</button>

</div>

</div>

`;

document
.getElementById("allAds")
.prepend(ad);

}
  
function loadAds(){

let data =
localStorage.getItem("axtartap_ads");

if(!data) return;

let ads =
JSON.parse(data);

document.getElementById("allAds").innerHTML="";

ads.forEach(item=>{

createAdCard(item);

});

}

function deleteAd(btn){

let currentUser =
localStorage.getItem("logged_user");

let ad =
btn.closest(".ad");

let owner =
ad.dataset.owner;

if(currentUser!==owner){

alert("Yalnız öz elanınızı silə bilərsiniz");
return;

}

if(confirm("Elan silinsin?")){

ad.remove();

saveAds();
showMyAds();

}

}

function favoriteAd(btn){

if(btn.innerHTML==="❤️ Favori"){

btn.innerHTML="💖 Seçilmiş";

}else{

btn.innerHTML="❤️ Favori";

}

}

function searchAds(){

let text =
document
.getElementById("searchInput")
.value
.toLowerCase();

document
.querySelectorAll("#allAds .ad")
.forEach(ad=>{

if(
ad.innerText
.toLowerCase()
.includes(text)
){

ad.style.display="block";

}else{

ad.style.display="none";

}

});

}

function showMyAds(){

let currentUser =
localStorage.getItem("logged_user");

let myAds =
document.getElementById("myAds");

myAds.innerHTML="";

if(!currentUser) return;

document
.querySelectorAll("#allAds .ad")
.forEach(ad=>{

if(ad.dataset.owner===currentUser){

let copy =
ad.cloneNode(true);

myAds.appendChild(copy);

}

});

}

checkLogin();
loadAds();
showMyAds();

</script>

</div>

</body>
</html>
