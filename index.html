<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AxtarTap</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f5f7;
color:#222;
}

header{
background:#8B0000;
padding:15px 5%;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
gap:15px;
}

.logo{
font-size:34px;
font-weight:700;
color:white;
}

.logo span{
color:#ffd700;
}

.search-box{
display:flex;
flex:1;
gap:10px;
max-width:700px;
}

.search-box input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
outline:none;
font-size:15px;
}

.search-box button{
background:#ffd700;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.user-buttons{
display:flex;
gap:10px;
}

.user-buttons button{
background:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.container{
width:95%;
margin:auto;
}

.banner{
margin-top:20px;
background:#fff;
height:120px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#777;
border:2px dashed #ccc;
}

.categories{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
margin-top:25px;
}

.category{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:.3s;
font-size:17px;
font-weight:600;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.category:hover{
background:#8B0000;
color:white;
transform:translateY(-4px);
}

.form-box{
background:white;
padding:20px;
border-radius:12px;
margin-top:25px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.form-box h2{
margin-bottom:15px;
}

.form-box input,
.form-box textarea,
.form-box select{

width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
outline:none;

}

.form-box textarea{
height:120px;
resize:vertical;
}

.publishBtn{

width:100%;
background:#8B0000;
color:white;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

.ads-title{

margin-top:30px;
font-size:28px;
font-weight:700;

}

.ads{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
margin-top:20px;

}

.ad{

background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
transition:.3s;

}

.ad:hover{

transform:translateY(-5px);

}

.ad img{

width:100%;
height:220px;
object-fit:cover;

}

.ad-content{

padding:15px;

}

.price{

color:#0a8f2c;
font-size:24px;
font-weight:bold;
margin:10px 0;

}

.owner{

font-size:14px;
color:#666;

}

.date{

font-size:13px;
color:#999;
margin-top:5px;

}

.actions{

display:flex;
gap:8px;
margin-top:15px;

}

.actions button{

flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;

}

.favorite{

background:#ffd700;

}

.delete{

background:#c70000;
color:white;

}

.ad-banner{

margin:30px 0;
background:white;
height:90px;
display:flex;
align-items:center;
justify-content:center;
border:2px dashed #bbb;
border-radius:12px;

}

footer{

margin-top:40px;
background:#222;
color:white;
padding:30px;
text-align:center;

}

@media(max-width:700px){

.topbar{

flex-direction:column;

}

.search-box{

width:100%;

}

.logo{

font-size:28px;

}

}

</style>
</head>
<body>

<header>

<div class="topbar">

<div class="logo">
Axtar<span>Tap</span>
</div>

<div class="search-box">

<input id="searchInput" placeholder="Nə axtarırsınız?">

<button onclick="searchAds()">
Axtar
</button>

</div>

<div class="user-buttons">

<button onclick="openLogin()">
Giriş
</button>

<button onclick="openRegister()">
Qeydiyyat
</button>

</div>

</div>

</header>

<div class="container">

<div class="banner">

REKLAM BANNERİ (728x90)

</div>

<div class="categories">

<div class="category">📱 Telefonlar</div>
<div class="category">🚗 Avtomobillər</div>
<div class="category">🏠 Daşınmaz Əmlak</div>
<div class="category">💻 Kompüterlər</div>
<div class="category">👕 Geyim</div>
<div class="category">🎮 Oyunlar</div>
<div class="category">🪑 Mebel</div>
<div class="category">🐶 Heyvanlar</div>

</div>
<div class="form-box">

<h2>İstifadəçi Hesabı</h2>

<input
id="username"
type="text"
placeholder="İstifadəçi adı">

<input
id="password"
type="password"
placeholder="Parol">

<div style="display:flex;gap:10px;flex-wrap:wrap;">

<button
class="publishBtn"
style="flex:1;background:#0a8f2c;"
onclick="registerUser()">
Qeydiyyat
</button>

<button
class="publishBtn"
style="flex:1;background:#0057b8;"
onclick="loginUser()">
Giriş
</button>

<button
class="publishBtn"
style="flex:1;background:#555;"
onclick="logoutUser()">
Çıxış
</button>

</div>

<p id="status"
style="margin-top:15px;font-weight:bold;">
Hesaba daxil olun
</p>

</div>

<div class="form-box">

<h2>Yeni Elan Əlavə Et</h2>

<input
id="title"
placeholder="Elan başlığı">

<input
id="price"
placeholder="Qiymət (AZN)">

<input
id="image"
placeholder="Şəkil linki">

<select id="category">

<option>Telefonlar</option>
<option>Avtomobillər</option>
<option>Daşınmaz Əmlak</option>
<option>Kompüterlər</option>
<option>Geyim</option>
<option>Oyunlar</option>
<option>Mebel</option>
<option>Heyvanlar</option>

</select>

<input
id="phone"
placeholder="Telefon">

<textarea
id="description"
placeholder="Elanın tam təsviri"></textarea>

<button
class="publishBtn"
onclick="addAd()">
Elanı Paylaş
</button>

</div>

<div class="ad-banner">

REKLAM YERİ (970x90)

</div>

<h2 class="ads-title">

Son Elanlar

</h2>

<div
id="allAds"
class="ads">

</div>

<h2 class="ads-title">

Mənim Elanlarım

</h2>

<div
id="myAds"
class="ads">

</div>

<footer>

<p>
© 2026 AxtarTap.az
</p>

<p style="margin-top:10px;">
Bütün hüquqlar qorunur.
</p>

</footer>

  <script src="script.js"></script>

</body>
</html>
