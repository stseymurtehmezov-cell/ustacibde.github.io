<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Ağır Texnika İdarəetmə Paneli</title>
    <style id="dynamic-style">
        :root { --main-color: #fca311; --bg-color: #14213d; --text-color: #ffffff; --bg-image: none; }
        body { 
            background-color: var(--bg-color); 
            background-image: var(--bg-image); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: var(--text-color); 
            font-family: sans-serif; 
            margin: 0; 
            transition: 0.3s; 
        }
        header { background: rgba(0,0,0,0.8); padding: 20px; text-align: center; border-bottom: 3px solid var(--main-color); }
        .container { padding: 20px; }
        .card { background: rgba(31, 42, 68, 0.9); padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid var(--main-color); }
        .admin-panel { background: #2c3e50; padding: 20px; margin: 20px; border-radius: 10px; display: none; border: 2px solid var(--main-color); }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: none; box-sizing: border-box; }
        button { padding: 12px 20px; background: var(--main-color); border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <h1 id="title-text">Ağır Texnika</h1>
    <select id="langSelect" onchange="changeLanguage()">
        <option value="az">🇦🇿 Azərbaycan</option>
        <option value="tr">🇹🇷 Türkçe</option>
        <option value="en">🇬🇧 English</option>
        <option value="ru">🇷🇺 Русский</option>
    </select>
    <button onclick="toggleAdmin()">⚙️ Saytı Ayarla</button>
</header>

<div class="container">
    <div id="kataloq-list"></div>
</div>

<div class="admin-panel" id="adminPanel">
    <h3 id="admin-title">Sayt Ayarları</h3>
    <label>Əsas Rəng:</label> <input type="color" id="colorPicker" onchange="updateSettings()">
    <label>Arxa Fon Şəkil Linki:</label> <input type="text" id="bgImgUrl" placeholder="Şəkil URL-i yapışdır" oninput="updateSettings()">
    <hr>
    <h3>Yeni Elan</h3>
    <input type="text" id="prodName" placeholder="Məhsul/Usta Adı">
    <input type="text" id="prodImg" placeholder="Elan üçün şəkil linki">
    <button onclick="addProduct()">Elanı Yerləşdir</button>
    <button onclick="toggleAdmin()" style="background:#555; margin-top:10px;">Bağla</button>
</div>

<script>
    const translations = {
        az: { title: "Ağır Texnika Servis", admin: "Sayt Ayarları" },
        tr: { title: "Ağır İş Makinesi Servis", admin: "Site Ayarları" },
        en: { title: "Heavy Machinery Service", admin: "Site Settings" },
        ru: { title: "Сервис Тяжелой Техники", admin: "Настройки Сайта" }
    };

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        localStorage.setItem('lang', lang);
        document.getElementById('title-text').innerText = translations[lang].title;
        document.getElementById('admin-title').innerText = translations[lang].admin;
    }

    function updateSettings() {
        const color = document.getElementById('colorPicker').value;
        const bgUrl = document.getElementById('bgImgUrl').value;
        
        document.documentElement.style.setProperty('--main-color', color);
        if(bgUrl) document.documentElement.style.setProperty('--bg-image', `url('${bgUrl}')`);
        
        localStorage.setItem('themeColor', color);
        localStorage.setItem('bgImage', bgUrl);
    }

    function toggleAdmin() {
        const p = document.getElementById('adminPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function addProduct() {
        const name = document.getElementById('prodName').value;
        const img = document.getElementById('prodImg').value;
        let prods = JSON.parse(localStorage.getItem('products')) || [];
        prods.push({ name, img });
        localStorage.setItem('products', JSON.stringify(prods));
        render();
        alert("Elan uğurla əlavə edildi!");
    }

    function render() {
        const list = document.getElementById('kataloq-list');
        const prods = JSON.parse(localStorage.getItem('products')) || [];
        list.innerHTML = prods.map(p => `
            <div class="card">
                ${p.img ? `<img src="${p.img}" style="width:80px; display:block; margin-bottom:10px;">` : ''}
                <h3>${p.name}</h3>
            </div>`).join('');
    }

    window.onload = () => {
        // Ayarları yüklə
        const savedColor = localStorage.getItem('themeColor') || '#fca311';
        const savedBg = localStorage.getItem('bgImage') || '';
        document.getElementById('colorPicker').value = savedColor;
        document.getElementById('bgImgUrl').value = savedBg;
        
        document.documentElement.style.setProperty('--main-color', savedColor);
        if(savedBg) document.documentElement.style.setProperty('--bg-image', `url('${savedBg}')`);

        const savedLang = localStorage.getItem('lang') || 'az';
        document.getElementById('langSelect').value = savedLang;
        
        changeLanguage();
        render();
    };
</script>
</body>
</html>
